name: Windows AnyDesk RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download AnyDesk
        run: |
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"

      - name: Install AnyDesk Silently
        run: |
          .\AnyDesk.exe --install "C:\Program Files (x86)\AnyDesk" --start-with-win --silent

      - name: Set AnyDesk Password
        run: |
          # Ganti 'PasswordAnda123!' sesuai keinginan Anda
          cmd /c 'echo PasswordAnda123! | "C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --set-password'

      - name: Get AnyDesk ID (Direct File Read Method)
        run: |
          $confPath = "C:\ProgramData\AnyDesk\system.conf"
          $maxTries = 20
          $tryCount = 0
          $anydeskId = ""

          Write-Host "Mencari ID AnyDesk di file system.conf..."

          while ([string]::IsNullOrWhiteSpace($anydeskId) -and $tryCount -lt $maxTries) {
              $tryCount++
              if (Test-Path $confPath) {
                  $content = Get-Content $confPath
                  # Mencari baris yang mengandung 'ad.anydesk.id='
                  $idLine = $content | Select-String "ad.anydesk.id="
                  if ($idLine) {
                      # Mengambil angka ID setelah tanda '='
                      $anydeskId = $idLine.ToString().Split('=')[1].Trim()
                  }
              }
              
              if ([string]::IsNullOrWhiteSpace($anydeskId)) {
                  Write-Host "Percobaan ${tryCount}/${maxTries}: ID belum tersedia, menunggu 5 detik..."
                  Start-Sleep -Seconds 5
              }
          }

          if (![string]::IsNullOrWhiteSpace($anydeskId)) {
              Write-Host "========================================================="
              Write-Host "ANYDESK ID: $anydeskId"
              Write-Host "PASSWORD: PasswordAnda123!"
              Write-Host "========================================================="
          } else {
              Write-Host "DEBUG: Isi folder ProgramData\AnyDesk:"
              Get-ChildItem "C:\ProgramData\AnyDesk"
              Write-Error "Gagal mendapatkan ID bahkan dari file system.conf"
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "Runner aktif. Silakan connect via AnyDesk sekarang."
          Start-Sleep -Seconds 21600
