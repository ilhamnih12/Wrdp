name: Windows AnyDesk RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download AnyDesk
        run: |
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"

      - name: Install AnyDesk Silently
        run: |
          .\AnyDesk.exe --install "C:\Program Files (x86)\AnyDesk" --start-with-win --silent

      - name: Set AnyDesk Password
        run: |
          # Ganti 'PasswordAnda123!' sesuai keinginan Anda
          cmd /c 'echo PasswordAnda123! | "C:\Program Files (x86)\AnyDesk\AnyDesk.exe" --set-password'

      - name: Get AnyDesk ID (Fixed Parser)
        run: |
          $exePath = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          $anydeskId = ""
          $maxTries = 12 
          $tryCount = 0

          Write-Host "Menunggu AnyDesk mendapatkan ID dari server..."

          while ([string]::IsNullOrWhiteSpace($anydeskId) -and $tryCount -lt $maxTries) {
              $tryCount++
              $anydeskId = & $exePath --get-id
              
              if ([string]::IsNullOrWhiteSpace($anydeskId)) {
                  # Menggunakan ${} untuk menghindari ParserError
                  Write-Host "Percobaan ${tryCount}/${maxTries}: ID masih kosong, menunggu 5 detik..."
                  Start-Sleep -Seconds 5
              }
          }

          if (![string]::IsNullOrWhiteSpace($anydeskId)) {
              Write-Host "========================================================="
              Write-Host "ANYDESK ID: $($anydeskId.Trim())"
              Write-Host "PASSWORD: PasswordAnda123!"
              Write-Host "========================================================="
          } else {
              Write-Error "Gagal mendapatkan AnyDesk ID setelah ${maxTries} percobaan."
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "Runner aktif. Silakan connect via AnyDesk sekarang."
          Start-Sleep -Seconds 21600
